<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroGuide - Votre Boussole Céleste</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.umd.min.js"></script>
    <script src="https://unpkg.com/html-to-image"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="./style.css">
    
    <style>
        /* Tailwind configuration for custom colors if needed */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    </style>
</head>
<body data-theme="dark">
<audio id="bg-audio" loop src="./assets/musique-astrale.mp3"></audio>
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div id="glow-1" class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] blur-[120px] rounded-full opacity-20 bg-violet-900"></div>
        <div id="glow-2" class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] blur-[120px] rounded-full opacity-20 bg-blue-900"></div>
    </div>

    <div class="relative z-10 min-h-screen flex flex-col">
        <div class="flex justify-between items-center px-4 md:px-8 py-4">
            <div class="flex gap-2 ml-auto">
                <button id="mute-toggle" class="p-3 rounded-full bg-opacity-20 bg-violet-800 text-violet-400 hover:scale-110 transition-all">
                    <i data-lucide="volume-x" id="mute-icon"></i>
                </button>
            </div>
        </div>

        <nav class="flex flex-wrap justify-center p-4 md:p-6 gap-4 md:gap-8">
            <button class="btn-nav active" data-section="home">
                <i data-lucide="compass" class="w-4 h-4"></i> Mon Signe
            </button>
            <button class="btn-nav" data-section="explorer">
                <i data-lucide="grid" class="w-4 h-4"></i> Explorer
            </button>
            <button class="btn-nav" data-section="compatibility">
                <i data-lucide="heart" class="w-4 h-4"></i> Compatibilité
            </button>
            <button class="btn-nav" data-section="astral-card">
                <i data-lucide="camera" class="w-4 h-4"></i> Carte Astrale
            </button>
        </nav>

        <main class="container mx-auto px-4 py-8 max-w-5xl flex-1">
            <header class="text-center mb-12">
                <h1 id="main-title" class="text-5xl md:text-6xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-blue-400">
                    AstroGuide
                </h1>
                <p class="opacity-70 text-lg text-violet-200" id="main-subtitle">Explorez les mystères du zodiaque et les liens célestes.</p>
            </header>

            <section id="section-home" class="section active fade-in">
                <div class="max-w-md mx-auto glass-card p-8">
                    <div class="flex justify-center mb-6">
                        <div class="p-4 rounded-2xl border border-violet-500/20 bg-violet-500/10">
                            <i data-lucide="sparkles" class="w-8 h-8 text-violet-400"></i>
                        </div>
                    </div>
                    <h2 class="text-2xl font-bold text-center mb-6">Quelle est votre date de naissance ?</h2>
                    <form id="find-sign-form" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-xs uppercase font-bold ml-1 text-violet-400">Jour</label>
                                <select id="birth-day" class="input-select"></select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs uppercase font-bold ml-1 text-violet-400">Mois</label>
                                <select id="birth-month" class="input-select"></select>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary flex items-center justify-center gap-2">
                            <i data-lucide="search" class="w-5 h-5"></i> Découvrir mon signe
                        </button>
                    </form>
                </div>
            </section>

            <section id="section-result" class="section fade-in">
                <div id="zodiac-card-container"></div>
            </section>

            <section id="section-explorer" class="section fade-in">
                <div id="explorer-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-6"></div>
            </section>

            <section id="section-compatibility" class="section fade-in">
                <div class="max-w-2xl mx-auto glass-card p-8">
                    <h2 class="text-3xl font-bold text-center mb-8">Testeur de Compatibilité</h2>
                    <div class="grid md:grid-cols-2 gap-8 mb-8">
                        <div class="space-y-2">
                            <label class="text-sm font-medium ml-1 text-violet-400">Premier Signe</label>
                            <select id="comp-sign-1" class="input-select"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium ml-1 text-violet-400">Second Signe</label>
                            <select id="comp-sign-2" class="input-select"></select>
                        </div>
                    </div>
                    <button id="calculate-comp" class="btn-primary">Calculer l'affinité</button>
                    <div id="compatibility-result" class="mt-8"></div>
                </div>
            </section>

            <section id="section-astral-card" class="section fade-in">
                <div class="grid md:grid-cols-2 gap-12 items-start">
                    <div class="glass-card p-8 space-y-6">
                        <h2 class="text-2xl font-bold mb-4">Créez votre Passeport Astral</h2>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-xs uppercase font-bold ml-1 text-violet-400">Prénom</label>
                                    <input type="text" id="pass-firstname" placeholder="Jean" class="input-select px-4">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs uppercase font-bold ml-1 text-violet-400">Nom</label>
                                    <input type="text" id="pass-lastname" placeholder="Dupont" class="input-select px-4">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs uppercase font-bold ml-1 text-violet-400">Sexe</label>
                                <div class="flex gap-2" id="gender-toggle">
                                    <button class="flex-1 py-2 rounded-xl border border-violet-500/20 bg-violet-800/20 text-violet-400 text-sm active-gender" data-gender="Homme">Homme</button>
                                    <button class="flex-1 py-2 rounded-xl border border-violet-500/20 bg-violet-800/20 text-violet-400 text-sm" data-gender="Femme">Femme</button>
                                    <button class="flex-1 py-2 rounded-xl border border-violet-500/20 bg-violet-800/20 text-violet-400 text-sm" data-gender="Autre">Autre</button>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs uppercase font-bold ml-1 text-violet-400">Photo (optionnel)</label>
                                <div class="flex items-center gap-4">
                                    <div id="photo-preview" class="w-16 h-16 rounded-xl flex items-center justify-center overflow-hidden border border-violet-500/20 bg-violet-800/20">
                                        <i data-lucide="user" class="w-6 h-6 text-violet-400 opacity-50"></i>
                                    </div>
                                    <label class="flex-1 flex items-center justify-center gap-2 border border-violet-500/20 py-3 rounded-xl cursor-pointer bg-violet-800/20 text-violet-400 text-sm hover:bg-violet-800/30 transition-all">
                                        <i data-lucide="upload" class="w-4 h-4"></i> Importer une photo
                                        <input type="file" id="photo-input" accept="image/*" class="hidden">
                                    </label>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs uppercase font-bold ml-1 text-violet-400">Signe Astrologique</label>
                                <select id="pass-sign" class="input-select"></select>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col items-center gap-6">
                        <div id="passport-capture-area">
                            </div>
                        <button id="download-passport" class="btn-primary flex items-center justify-center gap-2 w-auto px-8">
                            <i data-lucide="download" class="w-5 h-5"></i> Télécharger mon Passeport
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="mt-12 p-8 text-center text-sm opacity-40">
            <p>© 2026 AstroGuide • Sagesse des étoiles</p>
        </footer>
    </div>

    <template id="tpl-zodiac-card">
        <div class="w-full max-w-2xl mx-auto glass-card overflow-hidden shadow-2xl border border-violet-500/30">
            <div class="relative p-8">
                <button class="back-to-home absolute top-6 left-6 text-violet-300 hover:text-white transition-colors flex items-center gap-1">
                    ← <span class="text-sm">Retour</span>
                </button>
                <div class="flex flex-col items-center mb-8">
                    <div class="text-7xl mb-4 zodiac-symbol-glow"></div>
                    <h2 class="text-4xl font-bold mb-2 zodiac-name"></h2>
                    <div class="flex gap-2">
                        <span class="px-4 py-1 bg-violet-900/40 rounded-full text-violet-200 text-xs font-medium border border-violet-400/20 zodiac-element"></span>
                        <span class="px-4 py-1 bg-blue-900/40 rounded-full text-blue-200 text-xs font-medium border border-blue-400/20 flex items-center gap-1">
                            <i data-lucide="globe" class="w-3 h-3"></i> <span class="zodiac-planet"></span>
                        </span>
                    </div>
                </div>
                <div class="space-y-8">
                    <section class="bg-violet-900/30 p-6 rounded-2xl border border-yellow-500/10 italic text-center">
                        <p class="text-violet-100 text-lg leading-relaxed zodiac-quote"></p>
                    </section>
                    <section>
                        <h3 class="text-xl font-semibold text-violet-300 mb-3 flex items-center gap-2">
                            <i data-lucide="star" class="w-5 h-5"></i> Description
                        </h3>
                        <p class="text-gray-300 leading-relaxed zodiac-desc"></p>
                    </section>
                    <section>
                        <h3 class="text-xl font-semibold text-violet-200 mb-3 flex items-center gap-2">
                            <i data-lucide="book-open" class="w-5 h-5"></i> Histoire & Mythologie
                        </h3>
                        <p class="text-gray-300/80 leading-relaxed italic text-sm zodiac-history"></p>
                    </section>
                    <section>
                        <h3 class="text-xl font-semibold text-violet-200 mb-3 flex items-center gap-2">
                            <i data-lucide="zap" class="w-5 h-5"></i> Traits de personnalité
                        </h3>
                        <div class="flex flex-wrap gap-2 zodiac-traits"></div>
                    </section>
                    <div class="grid md:grid-cols-2 gap-6">
                        <section class="p-4 bg-green-900/10 border border-green-500/20 rounded-2xl">
                            <h3 class="text-lg font-semibold text-green-300 mb-3 flex items-center gap-2">
                                <i data-lucide="heart" class="w-4 h-4"></i> Compatibles
                            </h3>
                            <div class="flex flex-wrap gap-2 zodiac-compat-plus"></div>
                        </section>
                        <section class="p-4 bg-red-900/10 border border-red-500/20 rounded-2xl">
                            <h3 class="text-lg font-semibold text-red-300 mb-3 flex items-center gap-2">
                                <i data-lucide="alert-triangle" class="w-4 h-4"></i> Moins compatibles
                            </h3>
                            <div class="flex flex-wrap gap-2 zodiac-compat-minus"></div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="./script.js"></script>
</body>
</html>
